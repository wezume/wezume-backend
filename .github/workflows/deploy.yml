name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build WAR
        run: ./mvnw clean package -DskipTests -Djavacpp.platform=linux-x86_64

      - name: Deploy WAR
        run: |
          cp target/vprofile-0.0.1-SNAPSHOT.war \
            /home/wezume/htdocs/wezume.in/wez-vprofile-0.0.1-SNAPSHOT.war

      - name: Restart backend service
        run: |
          systemctl restart wezume-backend
          sleep 5
          systemctl status wezume-backend --no-pager
