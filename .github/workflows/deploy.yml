name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build WAR
        run: ./mvnw clean package -DskipTests

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 89.116.134.110 >> ~/.ssh/known_hosts

      - name: Upload WAR to server
        run: |
          scp -i ~/.ssh/deploy_key \
            target/wez-vprofile-0.0.1-SNAPSHOT.war \
            root@89.116.134.110:/home/wezume/htdocs/wezume.in/wez-vprofile-0.0.1-SNAPSHOT.war

      - name: Restart backend service
        run: |
          ssh -i ~/.ssh/deploy_key root@89.116.134.110 \
            "systemctl restart wezume-backend && sleep 5 && systemctl status wezume-backend --no-pager"
